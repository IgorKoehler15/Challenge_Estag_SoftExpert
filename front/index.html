<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <title>Suite Store</title>
</head>
<body>
    <header>
        <nav>
            <div class="nav-group">
                <div class="logo"><a href="index.html">Suite Store</a></div>
                <ul class="nav-links" id="nav-links">
                    <li><a href="products.html">Products</a></li>
                    <li><a href="categories.html">Categories</a></li>
                    <li><a href="history.html">History</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="container">
        <aside class="aside-1">
            <div class="form-group">
                <select id="prod" name="prod">
                    <option value="" selected disabled>Select a Product</option>
                </select>
            </div>

            <div class="input-row">
                <div class="form-group" style="flex: 1;">
                    <input type="number" id="amount" name="amount" placeholder="Amount">
                </div>
                <div class="form-group" style="flex: 1;">
                    <input type="number" id="tax" name="tax" placeholder="Tax">
                </div>
                <div class="form-group" style="flex: 1;">
                    <input type="number" id="price" name="price" placeholder="Price">
                </div>
            </div>

            <button class="addProduct">Add Product</button>
        </aside>

        <aside class="aside-2">
            <table class="tabelaProdutos">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Amount</th>
                        <th>Tax</th> <th>Total</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="filler-row">
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                </tbody>
            </table>

            <div class="totals-section">
                <div class="total-row">
                    <label>Tax:</label>
                    <span>$0.00</span>
                </div>
                <div class="total-row">
                    <label>Total:</label>
                    <span>$0.00</span>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-cancel">Cancel</button>
                <button class="btn-finish">Finish</button>
            </div>
        </aside>
    </div>
    <script src="js/home.js"></script>
</body>
</html>
