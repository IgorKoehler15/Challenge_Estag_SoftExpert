<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <title>Categories</title>
</head>
<body>
    <header>
        <nav>
            <div class="nav-group">
                <div class="logo"><a href="index.html">Suite Store</a></div>
                <ul class="nav-links" id="nav-links">
                    <li><a href="products.html">Products</a></li>
                    <li><a href="categories.html">Categories</a></li>
                    <li><a href="history.html">History</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="container">
        <aside class="aside-1">
            <div class="input-row">
                <div class="form-group" style="flex: 2;">
                    <input type="text" id="category" name="category" placeholder="Category Name">
                </div>

                <div class="form-group" style="flex: 1;">
                    <input type="number" id="taxCategory" name="taxCategory" placeholder="Tax">
                </div>
            </div>
            <button class="addCategory">Add Category</button>
        </aside>

        <aside class="aside-2">
            <table class="table-categories">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Category</th>
                        <th>Tax</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="filler-row">
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </aside>
    </div>
    <script src="js/categories.js"></script>
</body>
</html>
